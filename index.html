<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Archivo Familiar">
<meta name="theme-color" content="#1e293b">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='38' fill='%231e293b'/%3E%3Crect x='52' y='44' width='76' height='92' rx='6' fill='none' stroke='%23cbd5e1' stroke-width='6'/%3E%3Cpath d='M68 70h44M68 88h44M68 106h28' stroke='%2394a3b8' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">
<title>Archivo Familiar</title>
<style>
  :root{
    --bg:#eef0f3; --card:#ffffff; --ink:#1e293b; --muted:#64748b; --muted2:#94a3b8;
    --line:#dfe3e8; --line2:#e9ecf1;
    --brand:#1e293b; --brand-d:#0f172a; --accent:#3b5b7d; --danger:#9f1d1d;
    --shadow:0 1px 2px rgba(15,23,42,.05);
    --shadow-lg:0 10px 30px rgba(15,23,42,.16);
    --r:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.45; letter-spacing:.005em;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .hidden{display:none!important}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
  input,select,textarea{font-family:inherit; font-size:16px}

  /* Top bar */
  header.topbar{
    position:sticky; top:0; z-index:30; background:var(--brand);
    color:#fff; padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;
    display:flex; align-items:center; gap:12px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .brand{flex:1; min-width:0}
  .brand h1{
    font-size:16.5px; margin:0; font-weight:600; letter-spacing:.02em; line-height:1.1;
    display:flex; align-items:center; gap:9px;
  }
  .brand .logo{width:20px;height:20px;flex:none;opacity:.92}
  .brand .sub{font-size:11px; color:#94a3b8; letter-spacing:.09em; text-transform:uppercase; margin-top:3px; font-weight:500}
  .who{
    display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.14);
    padding:6px 9px 6px 7px; border-radius:8px; color:#e2e8f0; font-weight:500; font-size:13.5px;
  }
  .who .av{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;font-size:11.5px;font-weight:600;color:#fff;letter-spacing:.02em}

  .wrap{max-width:780px; margin:0 auto; padding:16px 16px 0}

  /* Search + filters */
  .search{
    display:flex; align-items:center; gap:9px; background:var(--card);
    border:1px solid var(--line); border-radius:var(--r); padding:11px 13px; box-shadow:var(--shadow);
  }
  .search input{border:none; outline:none; flex:1; background:none; color:var(--ink); font-size:15px}
  .search input::placeholder{color:var(--muted2)}
  .search svg{flex:none}
  .filters{display:flex; gap:7px; overflow-x:auto; padding:14px 2px 4px; scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{
    flex:none; border:1px solid var(--line); background:var(--card); color:var(--muted);
    padding:7px 12px; border-radius:7px; font-size:13px; font-weight:500; white-space:nowrap;
    display:flex; align-items:center; gap:7px;
  }
  .chip.active{background:var(--brand); color:#fff; border-color:var(--brand)}
  .cdot{width:8px;height:8px;border-radius:2px;flex:none;display:inline-block}

  /* Section label */
  .seclabel{font-size:11.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted2); font-weight:600; margin:10px 2px 2px}

  /* Cards */
  .grid{display:flex; flex-direction:column; gap:1px; margin-top:8px; background:var(--line2); border:1px solid var(--line); border-radius:var(--r); overflow:hidden}
  .grid:empty{display:none}
  .doc{
    display:flex; gap:13px; background:var(--card); padding:12px 13px; align-items:center; text-align:left; width:100%;
    transition:background .12s;
  }
  .doc:active{background:#f7f8fa}
  .doc .thumb{
    width:54px; height:54px; border-radius:6px; object-fit:cover; flex:none; background:#e2e8f0; border:1px solid var(--line);
  }
  .doc .body{flex:1; min-width:0}
  .doc .t{font-weight:600; font-size:14.5px; margin:0 0 3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--ink)}
  .doc .sub{font-size:12.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:6px}
  .doc .tags{display:flex; gap:7px; margin-top:6px; flex-wrap:wrap; align-items:center}
  .tag{font-size:11px; font-weight:600; padding:2px 8px; border-radius:5px; letter-spacing:.01em}
  .tag-meta{font-size:11px; color:var(--muted2); font-weight:500}
  .chev{flex:none; color:var(--muted2)}

  .empty{text-align:center; color:var(--muted); padding:64px 24px}
  .empty svg{margin-bottom:14px}
  .empty b{display:block; color:var(--ink); font-size:15px; margin-bottom:4px; font-weight:600}
  .empty span{font-size:13.5px}

  /* Add button */
  .fab{
    position:fixed; right:18px; bottom:calc(80px + env(safe-area-inset-bottom)); z-index:36;
    display:flex; align-items:center; gap:8px; background:var(--brand); color:#fff;
    padding:14px 18px 14px 15px; border-radius:10px; font-size:14.5px; font-weight:600;
    box-shadow:0 6px 18px rgba(15,23,42,.32);
  }
  .fab:active{background:var(--brand-d)}
  .fab svg{flex:none}

  /* Sheet / modal */
  .overlay{position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:40; display:flex; align-items:flex-end; justify-content:center}
  .sheet{
    background:var(--bg); width:100%; max-width:780px; max-height:90vh; max-height:calc(100dvh - env(safe-area-inset-top) - 16px); overflow-y:auto;
    border-radius:14px 14px 0 0; padding:0 0 28px; box-shadow:var(--shadow-lg);
    animation:up .2s ease;
  }
  @keyframes up{from{transform:translateY(24px); opacity:.7}to{transform:none; opacity:1}}
  .sheet-head{
    position:sticky; top:0; background:var(--card); padding:15px 16px; z-index:2;
    display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--line);
  }
  .sheet-head h2{font-size:15.5px; margin:0; flex:1; font-weight:600; letter-spacing:.01em}
  .iconbtn{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:var(--muted);font-size:18px;background:var(--bg);border:1px solid var(--line)}
  .iconbtn:active{background:var(--line2)}
  .sheet-body{padding:18px 16px}

  label.fld{display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin:18px 0 7px; text-transform:uppercase; letter-spacing:.06em}
  label.fld:first-of-type{margin-top:0}
  .input, select.input, textarea.input{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:12px;
    background:var(--card); color:var(--ink); outline:none; font-size:15px;
  }
  .input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,91,125,.12)}
  textarea.input{resize:vertical; min-height:68px; line-height:1.5}

  .seg{display:flex; flex-wrap:wrap; gap:7px}
  .seg button{
    border:1px solid var(--line); background:var(--card); padding:9px 12px; border-radius:7px;
    font-weight:500; font-size:13.5px; color:var(--ink); display:flex; align-items:center; gap:8px;
  }
  .seg button.on{border-color:var(--accent); background:#f3f6f9; font-weight:600}
  .dot{width:9px;height:9px;border-radius:2px}

  .photos{display:flex; gap:10px; flex-wrap:wrap; margin-top:2px}
  .photo{position:relative; width:82px; height:82px; border-radius:8px; overflow:hidden; border:1px solid var(--line)}
  .photo img{width:100%;height:100%;object-fit:cover}
  .photo .x{position:absolute; top:4px; right:4px; width:22px;height:22px; border-radius:6px; background:rgba(15,23,42,.78); color:#fff; font-size:13px; display:grid; place-items:center}
  .addphoto{
    width:82px;height:82px;border-radius:8px;border:1px dashed var(--muted2); display:grid; place-items:center;
    color:var(--accent); font-size:12px; font-weight:600; text-align:center; background:var(--card);
  }
  .addphoto svg{display:block;margin:0 auto 3px}

  .btn-primary{
    width:100%; background:var(--brand); color:#fff; padding:14px; border-radius:9px;
    font-size:15px; font-weight:600; margin-top:24px; letter-spacing:.01em;
  }
  .btn-primary:active{background:var(--brand-d)}
  .btn-primary:disabled{opacity:.45}
  .btn-ghost{width:100%; padding:13px; border-radius:9px; font-weight:600; color:var(--danger); background:var(--card); border:1px solid var(--line); margin-top:10px; font-size:14px}

  .ocrnote{font-size:12.5px; color:var(--muted); margin-top:9px; display:flex; align-items:center; gap:8px; min-height:18px}
  .spin{width:13px;height:13px;border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:rot .8s linear infinite; flex:none}
  @keyframes rot{to{transform:rotate(360deg)}}

  /* Detail viewer */
  .viewer-img{width:100%; border-radius:8px; margin-bottom:10px; background:#0f172a; display:block; border:1px solid var(--line)}
  .meta-card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:2px 14px; margin-top:4px}
  .meta-row{display:flex; gap:14px; padding:12px 0; border-bottom:1px solid var(--line2); font-size:14px}
  .meta-row:last-child{border-bottom:none}
  .meta-row .k{color:var(--muted); width:84px; flex:none; font-weight:500; font-size:12.5px; padding-top:1px}
  .meta-row .v{flex:1; color:var(--ink)}

  /* Menu */
  .menu{position:absolute; right:14px; top:calc(env(safe-area-inset-top) + 58px); background:var(--card); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow-lg); z-index:50; overflow:hidden; min-width:226px}
  .menu button{display:flex; align-items:center; gap:11px; width:100%; padding:12px 15px; text-align:left; font-size:14.5px; color:var(--ink)}
  .menu button:active{background:var(--bg)}
  .menu .sep{height:1px; background:var(--line)}
  .menu .who-item .av{width:26px;height:26px;border-radius:6px;display:grid;place-items:center;font-size:11.5px;font-weight:600;color:#fff}
  .menu .who-item.sel{font-weight:600; background:#f3f6f9}
  .menu .ttl{font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted2); padding:11px 15px 5px; font-weight:600}
  .menu .mi-ico{width:20px; display:grid; place-items:center; color:var(--muted)}

  .toast{position:fixed; left:50%; bottom:96px; transform:translateX(-50%); background:#0f172a; color:#fff; padding:11px 18px; border-radius:8px; font-size:13.5px; z-index:60; box-shadow:var(--shadow-lg); opacity:0; transition:opacity .2s, transform .2s; max-width:88%}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px)}

  /* Bottom navigation */
  body{padding-bottom:calc(66px + env(safe-area-inset-bottom))}
  .bottomnav{position:fixed; left:0; right:0; bottom:0; z-index:35; display:flex; background:var(--card); border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom)}
  .navbtn{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:9px 4px 8px; color:var(--muted2); font-size:11px; font-weight:600; letter-spacing:.01em}
  .navbtn.on{color:var(--brand)}
  .navbtn.on svg [stroke]{stroke:var(--brand)}

  /* Vault / recordatorios */
  .lock{max-width:340px; margin:30px auto 0; text-align:center; padding:8px 16px}
  .lock .ic{width:54px;height:54px;border-radius:14px;background:#f3f6f9;border:1px solid var(--line);display:grid;place-items:center;margin:0 auto 14px}
  .lock h3{margin:0 0 6px; font-size:17px}
  .lock p{margin:0 0 16px; color:var(--muted); font-size:13.5px; line-height:1.55}
  .lock input{width:100%; text-align:center; letter-spacing:.04em; margin-bottom:10px}
  .lock .err{color:var(--danger); font-size:13px; min-height:18px; margin-bottom:4px}
  .lockbar{display:flex; align-items:center; justify-content:space-between; margin:0 2px 10px}
  .lockbar .u{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px}
  .lockbar button{font-size:12.5px; font-weight:600; color:var(--accent); display:flex; align-items:center; gap:5px}
  .secret{display:flex; gap:12px; background:var(--card); padding:12px 13px; align-items:flex-start; text-align:left; width:100%}
  .secret .si{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;flex:none;font-size:15px;color:#fff;font-weight:700}
  .secret .body{flex:1; min-width:0}
  .secret .t{font-weight:600; font-size:14.5px; margin:0 0 2px; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .secret .acc{font-size:12.5px; color:var(--muted); margin-bottom:7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .secret .val{display:flex; align-items:center; gap:7px}
  .secret .val code{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:14px; background:#f3f6f9; border:1px solid var(--line); border-radius:6px; padding:6px 9px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; letter-spacing:.08em}
  .sbtn{width:32px;height:32px;border-radius:7px;border:1px solid var(--line);background:var(--card);display:grid;place-items:center;color:var(--muted);flex:none}
  .sbtn:active{background:var(--bg)}

  /* IA */
  .btn-ai{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#312e5a;color:#fff;border-radius:9px;padding:11px;font-weight:600;font-size:14px;margin-top:10px;border:none}
  .btn-ai:active{background:#26244a}
  .btn-ai:disabled{opacity:.6}
  .note-priv{font-size:11.5px;color:var(--muted2);margin-top:7px;line-height:1.5}
  .btn-neutral{width:100%; padding:13px; border-radius:9px; font-weight:600; color:var(--ink); background:var(--card); border:1px solid var(--line); margin-top:10px; font-size:14px}
  .btn-neutral:active{background:var(--bg)}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <h1>
      <svg class="logo" viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2" stroke="#cbd5e1" stroke-width="1.7"/><path d="M9 8h6M9 12h6M9 16h3.5" stroke="#94a3b8" stroke-width="1.7" stroke-linecap="round"/></svg>
      Archivo Familiar
    </h1>
    <div class="sub">Gestión de documentos</div>
  </div>
  <button class="who" id="whoBtn">
    <span class="av" id="whoAv">P</span>
    <span id="whoName">Todos</span>
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#cbd5e1" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</header>

<div class="wrap" id="docsView">
  <div class="search">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#94a3b8" stroke-width="1.9"/><path d="M21 21l-3.6-3.6" stroke="#94a3b8" stroke-width="1.9" stroke-linecap="round"/></svg>
    <input id="search" placeholder="Buscar por título, sitio o contenido…" autocomplete="off">
  </div>
  <div class="filters" id="catFilters"></div>
  <div class="grid" id="list"></div>
  <div id="emptyHost"></div>
</div>

<div class="wrap" id="secretsView" style="display:none">
  <div id="secretsHost"></div>
</div>

<nav class="bottomnav" id="bottomnav">
  <button class="navbtn on" data-tab="docs">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2" stroke="#94a3b8" stroke-width="1.7"/><path d="M9 8h6M9 12h6M9 16h3.5" stroke="#94a3b8" stroke-width="1.7" stroke-linecap="round"/></svg>
    Documentos
  </button>
  <button class="navbtn" data-tab="secrets">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="#94a3b8" stroke-width="1.7"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="#94a3b8" stroke-width="1.7"/></svg>
    Recordatorios
  </button>
</nav>

<button class="fab" id="addBtn" aria-label="Nuevo">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
  Nuevo
</button>

<div class="toast" id="toast"></div>
<div id="modalRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
"use strict";
if(typeof pdfjsLib!=="undefined"){ pdfjsLib.GlobalWorkerOptions.workerSrc="x"; }

/* ---------- Config ---------- */
const PROFILES = [
  { id:"pepe",    name:"Pepe",    color:"#3b5b7d" },
  { id:"carlota", name:"Carlota", color:"#8a4f66" },
  { id:"candela", name:"Candela", color:"#5a4e86" },
  { id:"vanesa",  name:"Vanesa",  color:"#2f6f6a" },
];
const CATEGORIES = [
  { id:"medico",  name:"Médico",         color:"#b4474c" },
  { id:"receta",  name:"Receta",         color:"#b07d2e" },
  { id:"factura", name:"Factura",        color:"#2f7d5b" },
  { id:"coche",   name:"Taller / Coche", color:"#3b5b7d" },
  { id:"colegio", name:"Colegio",        color:"#5a4e86" },
  { id:"hogar",   name:"Hogar",          color:"#2a6f86" },
  { id:"otros",   name:"Otros",          color:"#64748b" },
];
const profMap = Object.fromEntries(PROFILES.map(p=>[p.id,p]));
const catMap  = Object.fromEntries(CATEGORIES.map(c=>[c.id,c]));

/* ---------- State ---------- */
let state = { who:"all", cat:"all", q:"", tab:"docs" };

/* ---------- IndexedDB ---------- */
const DB_NAME="ArchivoFamiliar", STORE="docs";
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(DB_NAME,2);
    r.onupgradeneeded = e=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains(STORE)){ d.createObjectStore(STORE,{keyPath:"id"}); }
      if(!d.objectStoreNames.contains("secrets")){ d.createObjectStore("secrets",{keyPath:"id"}); }
    };
    r.onsuccess = e=>{ db=e.target.result; res(db); };
    r.onerror = e=>rej(e.target.error);
  });
}
function tx(mode){ return db.transaction(STORE,mode).objectStore(STORE); }
function allDocs(){
  return new Promise((res,rej)=>{
    const out=[]; const c=tx("readonly").openCursor();
    c.onsuccess=e=>{ const cur=e.target.result; if(cur){out.push(cur.value); cur.continue();} else res(out); };
    c.onerror=e=>rej(e.target.error);
  });
}
function putDoc(doc){ return new Promise((res,rej)=>{ const r=tx("readwrite").put(doc); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); }); }
function delDoc(id){ return new Promise((res,rej)=>{ const r=tx("readwrite").delete(id); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); }); }

/* ---------- Helpers ---------- */
const $ = s=>document.querySelector(s);
const el = (t,c)=>{ const e=document.createElement(t); if(c)e.className=c; return e; };
function initials(name){ return name.trim().charAt(0).toUpperCase(); }
function fmtDate(iso){ if(!iso) return ""; const d=new Date(iso+"T00:00:00"); return d.toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"}); }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function dotHTML(color){ return `<span class="cdot" style="background:${color}"></span>`; }

function fileToImage(file, maxDim=1600, quality=0.8){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(Math.max(w,h)>maxDim){ const s=maxDim/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      const c=el("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",quality));
    };
    img.onerror=rej;
    const fr=new FileReader();
    fr.onload=()=>{ img.src=fr.result; };
    fr.onerror=rej;
    fr.readAsDataURL(file);
  });
}

function fileToDataURL(file){
  return new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=rej; fr.readAsDataURL(file); });
}
function isPdf(file){ return file && (file.type==="application/pdf" || /\.pdf$/i.test(file.name||"")); }
function dataURLtoBytes(d){ const b=atob(d.split(",")[1]); const u=new Uint8Array(b.length); for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i); return u; }
async function pdfToPages(dataURL){
  const pdf = await pdfjsLib.getDocument({ data:dataURLtoBytes(dataURL) }).promise;
  const images=[]; let text="";
  const n=Math.min(pdf.numPages, 20);
  for(let i=1;i<=n;i++){
    const page=await pdf.getPage(i);
    try{ const tc=await page.getTextContent(); text += " " + tc.items.map(x=>x.str).join(" "); }catch(_){}
    const base=page.getViewport({scale:1});
    const scale=Math.min(2, 1100/base.width);
    const vp=page.getViewport({scale});
    const c=el("canvas"); c.width=Math.round(vp.width); c.height=Math.round(vp.height);
    await page.render({ canvasContext:c.getContext("2d"), viewport:vp }).promise;
    images.push(c.toDataURL("image/jpeg",0.72));
  }
  return { images, text:text.replace(/\s+/g," ").trim() };
}

function _clean(s){ return (s||"").replace(/\s+/g," ").replace(/^[\s:;,.\-–—]+/,"").replace(/[\s.;,\-–—]+$/,"").trim(); }
function _grab(text, labels, stops){
  for(const lab of labels){
    const re=new RegExp(lab+"\\s*[:.\\-]\\s*([\\s\\S]{2,400}?)(?=\\s*(?:"+stops+")\\b|$)","i");
    const m=text.match(re);
    if(m){ let v=_clean(m[1]); if(v.length>=2){ if(v.length>320) v=v.slice(0,320).replace(/\s+\S*$/,"")+"…"; return v; } }
  }
  return "";
}
function _findSite(text){
  let m=text.match(/\b(?:Dra?\.?|Doctora?)\s+([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+(?:\s+[A-ZÁÉÍÓÚÑ][a-záéíóúñ]+){0,3})/);
  if(m) return _clean("Dr. "+m[1]);
  m=text.match(/\b(Cl[íi]nica(?:\s+Dental)?|Hospital|Centro\s+de\s+Salud|Centro\s+M[ée]dico|Sanatorio|Policl[íi]nica|Laboratorio|Farmacia|Talleres?|Gabinete|Instituto)\s+([A-Z0-9ÁÉÍÓÚÑ][\wÁÉÍÓÚÑáéíóúñ.&'\- ]{2,36})/i);
  if(m) return _clean(_clean(m[0]).split(/\b(?:Factura|N[ºo°]|C\.?I\.?F|N\.?I\.?F|Tel[eé]fono|Fecha|Concepto|Base\s+imponible|IVA|Total)\b/i)[0]);
  return "";
}
function _findAmount(text){
  let m=text.match(/(?:total(?:\s+factura|\s+a\s*pagar)?|importe(?:\s+total)?)\s*[:\s]*([0-9][0-9.]*,[0-9]{2}|[0-9][0-9.,]*)\s*(?:€|eur|euros)?/i);
  if(m) return _clean(m[1])+" €";
  m=text.match(/([0-9][0-9.]*,[0-9]{2})\s*€/);
  if(m) return m[1]+" €";
  return "";
}
function _firstSentences(text,n=2,max=240){
  const c=(text||"").replace(/\s+/g," ").trim();
  const parts=c.split(/(?<=[.!?])\s+/).filter(p=>p.replace(/[^a-záéíóúñ]/gi,"").length>12);
  let out=parts.slice(0,n).join(" ");
  if(!out) out=c.slice(0,max);
  if(out.length>max) out=out.slice(0,max).replace(/\s+\S*$/,"")+"…";
  return out.trim();
}
function analyzeText(text, category){
  const t=text||"";
  const place=_findSite(t);
  const diagnosis=_grab(t, ["Diagn[óo]stico\\s+principal","Diagn[óo]stico","Juicio\\s+cl[íi]nico","Juicio\\s+diagn[óo]stico","Impresi[óo]n\\s+diagn[óo]stica"],
    "Tratamiento|Plan|Recomendaciones|Prescripci[óo]n|Medicaci[óo]n|Posolog[íi]a|Pauta|Evoluci[óo]n|Pruebas|Observaciones|Conclusi[óo]n|Firma|Fdo|Pron[óo]stico|Pr[óo]xima");
  const medication=_grab(t, ["Medicaci[óo]n","Tratamiento\\s+prescrito","Tratamiento","Prescripci[óo]n","Posolog[íi]a","Pauta\\s+farmacol[óo]gica"],
    "Recomendaciones|Plan|Evoluci[óo]n|Observaciones|Conclusi[óo]n|Firma|Fdo|Pron[óo]stico|Pr[óo]xima|Diagn[óo]stico|Pruebas|Exploraci[óo]n|Antecedentes|Motivo");
  let summary;
  if(category==="factura"){
    const amt=_findAmount(t);
    summary=(place?("Factura de "+place):"Factura")+(amt?(" · Total "+amt):"");
    if(!amt && !place) summary=_firstSentences(t);
  } else {
    summary=_firstSentences(t);
    if(diagnosis) summary=(summary?summary+" ":"")+"Diagnóstico: "+diagnosis;
  }
  return { place, diagnosis, medication, summary:_clean(summary) };
}

/* ---------- IA (Anthropic Claude) ---------- */
function aiConfig(){ return { key:(localStorage.getItem("af_aikey")||"").trim(), model:localStorage.getItem("af_aimodel")||"claude-haiku-4-5-20251001" }; }
function parseAIJson(txt){
  const m=(txt||"").match(/\{[\s\S]*\}/); if(!m) throw new Error("respuesta no válida");
  const o=JSON.parse(m[0]);
  return { place:(o.place||o.sitio||"").toString().trim(), summary:(o.summary||o.resumen||"").toString().trim(), diagnosis:(o.diagnosis||o.diagnostico||"").toString().trim(), medication:(o.medication||o.medicacion||"").toString().trim() };
}
function aiInstructions(category){
  const m={
    medico:"Es un documento médico. 'summary' = resumen breve de los comentarios y observaciones del médico (hallazgos y valoración clínica), sin repetir datos de cabecera ni personales. Rellena 'diagnosis' con el diagnóstico y 'medication' con el tratamiento prescrito si constan.",
    receta:"Es una receta médica. 'summary' = qué se prescribe y para qué, de forma breve. 'medication' = los medicamentos con su pauta (dosis y frecuencia). 'diagnosis' vacío salvo que conste.",
    factura:"Es una factura o ticket de compra. 'summary' = ÚNICAMENTE lo que se ha comprado (los conceptos o artículos y, si está claro, el importe total). No incluyas NIF, datos fiscales ni direcciones. 'diagnosis' y 'medication' vacíos.",
    coche:"Es una factura o informe de taller/coche. 'summary' = qué se ha reparado o comprado y el importe total si consta. 'diagnosis' y 'medication' vacíos.",
    colegio:"Documento escolar. 'summary' = resumen breve de su contenido. 'diagnosis' y 'medication' vacíos.",
    hogar:"Documento del hogar o suministros. 'summary' = resumen breve de su contenido o conceptos. 'diagnosis' y 'medication' vacíos.",
    otros:"'summary' = resumen breve y claro del contenido. 'diagnosis' y 'medication' vacíos salvo que claramente apliquen."
  };
  return m[category]||m.otros;
}
async function aiAnalyze(text, category){
  const { key, model }=aiConfig();
  if(!key) throw new Error("sin clave");
  const sys="Eres un asistente que lee documentos personales y extrae información. Responde SOLO con un objeto JSON válido, sin texto adicional ni markdown, con las claves exactas: place (profesional o establecimiento, p. ej. 'Dr. García' o 'Talleres Pérez'; cadena vacía si no consta), summary, diagnosis, medication. "+aiInstructions(category)+" El 'summary' va en español, claro y conciso. Usa cadena vacía cuando un campo no aplique.";
  const body={ model, max_tokens:800, system:sys, messages:[{ role:"user", content:"Texto del documento:\n\n"+String(text).slice(0,14000) }] };
  const res=await fetch("https://api.anthropic.com/v1/messages",{ method:"POST", headers:{ "content-type":"application/json", "x-api-key":key, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" }, body:JSON.stringify(body) });
  if(!res.ok){ let d=""; try{ d=(await res.json()).error?.message||""; }catch(_){} throw new Error("HTTP "+res.status+(d?" · "+d:"")); }
  const data=await res.json();
  const out=(data.content||[]).map(c=>c.text||"").join("");
  return parseAIJson(out);
}

function matches(d){
  if(state.who!=="all" && d.owner!==state.who) return false;

  if(state.q){
    const q=state.q.toLowerCase();
    const hay=[d.title,d.place,d.notes,d.summary,d.diagnosis,d.medication,d.ocrText,catMap[d.category]?.name,profMap[d.owner]?.name]
      .filter(Boolean).join(" ").toLowerCase();

  return true;
}

      draft.images.push(...images);
      let extra=text;
      if(extra.replace(/\s/g,"").length < 20 && typeof Tesseract!=="undefined"){
        for(const im of images){ try{ const { data }=await Tesseract.recognize(im,"spa"); extra += " " + (data.text||""); }catch(_){} }
      }
      draft.ocrText=((draft.ocrText||"")+" "+extra).replace(/\s+/g," ").trim();
      const got=applyAnalysis();
      renderPhotos(); validate();
      ocrNote.textContent = got.length ? ("PDF añadido. Datos extraídos: "+got.join(", ")+". Revíselos por si acaso.") : "PDF añadido e indexado. Es localizable por su contenido.";
    }catch(err){ ocrNote.textContent="PDF añadido (no se pudo previsualizar), pero se guardará igualmente."; }
  }

  fileIn.onchange=async()=>{
    const files=[...fileIn.files]; fileIn.value="";
    if(!files.length) return;
    const imgFiles=[];
    for(const f of files){
      if(isPdf(f)){ await addPdf(f); }
      else { try{ const data=await fileToImage(f); draft.images.push(data); imgFiles.push(f); }catch(_){} }
    }
    renderPhotos(); validate();
    if(imgFiles.length) runOCR(imgFiles);
  };

  async function runOCR(files){
    if(typeof Tesseract==="undefined"){ ocrNote.textContent="Búsqueda por contenido no disponible sin conexión."; return; }
    ocrNote.innerHTML=`<span class="spin"></span> Procesando el texto del documento para hacerlo localizable…`;
    try{
      let txt=draft.ocrText||"";
      for(const f of files){ const { data } = await Tesseract.recognize(f, "spa"); txt += " " + (data.text||""); }
      draft.ocrText=txt.replace(/\s+/g," ").trim();
      const got=applyAnalysis();
      ocrNote.textContent = got.length ? ("Texto reconocido. Datos extraídos: "+got.join(", ")+". Revíselos por si acaso.") : "Texto reconocido. El documento es localizable por su contenido.";
    }catch(err){ ocrNote.textContent="No se pudo procesar el texto; el documento se guardará igualmente."; }
  }

  sheet.querySelector("#closeF").onclick=()=>root.innerHTML="";
  const _cf=sheet.querySelector("#cancelF"); if(_cf) _cf.onclick=()=>root.innerHTML="";

  saveBtn.onclick=async()=>{
    draft.title=sheet.querySelector("#fTitle").value.trim();
    draft.place=sheet.querySelector("#fPlace").value.trim();
    draft.date=sheet.querySelector("#fDate").value;
    draft.notes=sheet.querySelector("#fNotes").value.trim();
    draft.summary=sheet.querySelector("#fSummary").value.trim();
    draft.diagnosis=sheet.querySelector("#fDiag").value.trim();
    draft.medication=sheet.querySelector("#fMed").value.trim();
    await putDoc(draft);
    root.innerHTML=""; await refresh();
    toast(existing?"Documento actualizado":"Documento guardado");
  };
  const delBtn=sheet.querySelector("#delF");
  if(delBtn) delBtn.onclick=async()=>{
    if(confirm("¿Eliminar este documento? Esta acción no se puede deshacer.")){
      await delDoc(draft.id); root.innerHTML=""; await refresh(); toast("Documento eliminado");
    }
  };

  const aiBtn=sheet.querySelector("#aiBtn");
  if(aiBtn){
    const runAI=async()=>{
      const text=(draft.ocrText||"").trim();
      if(text.length<10){ ocrNote.textContent="Añade primero una foto o PDF legible para que la IA pueda leerlo."; return; }
      const prev=aiBtn.innerHTML; aiBtn.disabled=true; aiBtn.innerHTML='<span class="spin"></span> Analizando con IA…';
      try{
        const a=await aiAnalyze(text, draft.category);
        const p=sheet.querySelector("#fPlace"); if(a.place && p) p.value=a.place;
        if(a.summary) sheet.querySelector("#fSummary").value=a.summary;
        if(a.diagnosis) sheet.querySelector("#fDiag").value=a.diagnosis;
        if(a.medication) sheet.querySelector("#fMed").value=a.medication;
        ocrNote.textContent="Analizado con IA. Revisa los campos por si quieres ajustarlos.";
      }catch(err){ ocrNote.textContent="No se pudo analizar con IA ("+(err.message||"error")+"). Revisa tu clave o conexión."; }
      aiBtn.disabled=false; aiBtn.innerHTML=prev;
    };
    aiBtn.onclick=()=>{
      if(!aiConfig().key){ toast("Primero configura tu clave de IA"); openAISettings(runAI); return; }
      runAI();
    };
  }

  validate();
}

/* ---------- Compartir (email / WhatsApp vía hoja nativa) ---------- */
function dataURLToFile(dataURL, name){
  const c=dataURL.indexOf(","); const head=dataURL.slice(0,c); const b64=dataURL.slice(c+1);
  const mime=(head.match(/data:([^;]+)/)||[])[1]||"application/octet-stream";
  const bin=atob(b64); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i);
  return new File([u], name, {type:mime});
}
function isIOS(){ return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform==="MacIntel" && (navigator.maxTouchPoints||0)>1); }
async function downloadFile(dataURL, name){
  let f;
  try{ f=dataURLToFile(dataURL, name); }
  catch(e){ toast("No se pudo preparar el archivo"); return; }
  // iOS ignora la descarga automática: usar la hoja de compartir (Guardar en Archivos / enviar)
  if(isIOS() && navigator.canShare){
    try{ if(navigator.canShare({files:[f]})){ await navigator.share({ files:[f], title:name||"documento" }); return; } }
    catch(e){ if(e && e.name==="AbortError") return; }
  }
  let url;
  try{ url=URL.createObjectURL(f); }catch(e){ toast("No se pudo abrir el archivo"); return; }
  if(isIOS()){
    const win=window.open(url,"_blank");
    if(!win){ location.href=url; }
  } else {
    const a=el("a"); a.href=url; a.download=name||"archivo"; document.body.appendChild(a); a.click(); a.remove();
    toast("Descargando PDF…");
  }
  setTimeout(()=>{ try{ URL.revokeObjectURL(url); }catch(_){} }, 60000);
}
async function shareDoc(d){
  const base=(d.title||"documento").replace(/[^\w\-]+/g,"_").slice(0,40)||"documento";
  const files=[];
  (d.images||[]).forEach((src,i)=>{ try{ files.push(dataURLToFile(src, base+(d.images.length>1?("_"+(i+1)):"")+".jpg")); }catch(_){} });
  (d.attachments||[]).forEach((a,i)=>{ try{ files.push(dataURLToFile(a.data, a.name||(base+"_"+(i+1)+".pdf"))); }catch(_){} });
  const text=[d.title, d.summary, d.place && ("Sitio: "+d.place)].filter(Boolean).join("\n");
  const title=d.title||"Documento";
  if(navigator.canShare && files.length && navigator.canShare({files})){
    try{ await navigator.share({ files, title, text }); return; }
    catch(e){ if(e && e.name==="AbortError") return; }
  }
  if(navigator.share){
    try{ await navigator.share({ title, text }); return; }
    catch(e){ if(e && e.name==="AbortError") return; }
  }
  // Fallback (escritorio sin compartir): descargar los archivos
  if(files.length){
    files.forEach(f=>{ const u=URL.createObjectURL(f); const a=el("a"); a.href=u; a.download=f.name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(u); });
    toast("Compartir directo no disponible aquí; archivos descargados");
  } else { toast("No hay archivos que compartir"); }
}

/* ================= Recordatorios (baúl cifrado) ================= */
const SECRET_CATS=[
  {id:"password", name:"Contraseña", color:"#3b5b7d"},
  {id:"pin",      name:"PIN",        color:"#b07d2e"},
  {id:"wifi",     name:"Wifi",       color:"#2f7d5b"},
  {id:"card",     name:"Tarjeta",    color:"#8a4f66"},
  {id:"code",     name:"Código",     color:"#5a4e86"},
  {id:"other",    name:"Otros",      color:"#64748b"},
];
const scatMap=Object.fromEntries(SECRET_CATS.map(c=>[c.id,c]));
let vaultKey=null, vaultUnlocked=false, SECRETS=[], sQuery="", sCat="all";

function stx(mode){ return db.transaction("secrets",mode).objectStore("secrets"); }
function sAll(){ return new Promise((res,rej)=>{ const out=[]; const c=stx("readonly").openCursor(); c.onsuccess=e=>{const cur=e.target.result; if(cur){out.push(cur.value); cur.continue();} else res(out);}; c.onerror=e=>rej(e.target.error); }); }
function sPut(rec){ return new Promise((res,rej)=>{ const r=stx("readwrite").put(rec); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); }); }
function sDel(id){ return new Promise((res,rej)=>{ const r=stx("readwrite").delete(id); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); }); }

const _cr = (typeof crypto!=="undefined" && crypto.subtle) ? crypto : null;
function _rand(n){ const a=new Uint8Array(n); _cr.getRandomValues(a); return a; }
function _b64(b){ let s=""; const u=new Uint8Array(b); for(let i=0;i<u.length;i++) s+=String.fromCharCode(u[i]); return btoa(s); }
function _ub64(s){ return Uint8Array.from(atob(s), c=>c.charCodeAt(0)); }
async function _deriveKey(pw, salt){
  const base=await _cr.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  return _cr.subtle.deriveKey({name:"PBKDF2", salt, iterations:150000, hash:"SHA-256"}, base, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}
async function _enc(key, obj){ const iv=_rand(12); const ct=await _cr.subtle.encrypt({name:"AES-GCM", iv}, key, new TextEncoder().encode(JSON.stringify(obj))); return {iv:_b64(iv), data:_b64(ct)}; }
async function _dec(key, enc){ const pt=await _cr.subtle.decrypt({name:"AES-GCM", iv:_ub64(enc.iv)}, key, _ub64(enc.data)); return JSON.parse(new TextDecoder().decode(pt)); }

async function getVaultMeta(){ const all=await sAll(); return all.find(r=>r.id==="__meta__")||null; }
async function setupVault(pw){
  const salt=_rand(16); const key=await _deriveKey(pw, salt);
  const verifier=await _enc(key, {v:"archivo-familiar"});
  await sPut({ id:"__meta__", salt:_b64(salt), verifier });
  vaultKey=key; vaultUnlocked=true; SECRETS=[];
}
async function unlockVault(pw){
  const meta=await getVaultMeta(); if(!meta) return false;
  const key=await _deriveKey(pw, _ub64(meta.salt));
  try{ await _dec(key, meta.verifier); }catch(_){ return false; }
  vaultKey=key; vaultUnlocked=true; await loadSecrets(); return true;
}
function lockVault(){ vaultKey=null; vaultUnlocked=false; SECRETS=[]; renderSecretsView(); }
async function loadSecrets(){
  const all=await sAll(); const out=[];
  for(const r of all){ if(r.id==="__meta__") continue;
    try{ const p=await _dec(vaultKey, r.enc); out.push({ id:r.id, owner:r.owner, category:r.category, createdAt:r.createdAt, ...p }); }catch(_){}
  }
  SECRETS=out;
}

function renderLock(host, setup){
  host.innerHTML=`
    <div class="lock">
      <div class="ic">${lockIcon()}</div>
      <h3>${setup?"Crea tu contraseña maestra":"Recordatorios bloqueados"}</h3>
      <p>${setup?"Protege tus contraseñas y PINes con una contraseña maestra que cifra los datos en tu dispositivo. <b>Si la olvidas, no se podrán recuperar.</b>":"Introduce tu contraseña maestra para ver tus recordatorios."}</p>
      <div class="err" id="lockErr"></div>

function secretMatches(s){
  if(state.who!=="all" && s.owner!==state.who) return false;
  if(sCat!=="all" && s.category!==sCat) return false;
  if(sQuery){ const q=sQuery.toLowerCase(); const hay=[s.title,s.account,s.site,s.notes,scatMap[s.category]?.name,profMap[s.owner]?.name].filter(Boolean).join(" ").toLowerCase(); if(!hay.includes(q)) return false; }
  return true;
}
function renderSecretList(){
  const host=$("#secretsHost");
  host.innerHTML=`
    <div class="lockbar"><span class="u">${lockIcon("#2f7d5b")} Desbloqueado</span><button id="lockNow">${lockIcon("#3b5b7d")} Bloquear</button></div>

function paintSecretFilters(){
  const box=$("#scatFilters"); if(!box) return; box.innerHTML="";
  const mk=(id,label,color)=>{ const b=el("button","chip"+(sCat===id?" active":"")); b.innerHTML=(color?dotHTML(color):"")+label; b.onclick=()=>{sCat=id; paintSecretFilters(); paintSecrets();}; return b; };
  box.appendChild(mk("all","Todas",null));

function paintSecrets(){
  const list=$("#slist"), host=$("#semptyHost"); if(!list) return; list.innerHTML=""; host.innerHTML="";
  const items=SECRETS.filter(secretMatches).sort((a,b)=>(a.title||"").localeCompare(b.title||""));
  if(!items.length){ host.innerHTML=`<div class="empty"><b>Sin recordatorios</b><span>${SECRETS.length?"Prueba con otra búsqueda o filtro.":"Pulsa “Nuevo” para guardar tu primera contraseña o PIN."}</span></div>`; return; }
  for(const s of items){
    const cat=scatMap[s.category]||scatMap.other, prof=profMap[s.owner]||PROFILES[0];
    const row=el("div","secret");
    const si=el("div","si"); si.style.background=cat.color; si.textContent=cat.name.charAt(0); row.appendChild(si);
    const body=el("div","body");
    body.innerHTML=`<p class="t">${esc(s.title||"(Sin título)")} <span class="tag" style="background:${prof.color}14;color:${prof.color};font-size:10.5px">${prof.name}</span></p>
      ${s.account?`<div class="acc">${esc(s.account)}${s.site?" · "+esc(s.site):""}</div>`:(s.site?`<div class="acc">${esc(s.site)}</div>`:"")}
      <div class="val"><code>••••••••</code>
        <button class="sbtn reveal" aria-label="Mostrar">${eyeIcon()}</button>
        <button class="sbtn copy" aria-label="Copiar">${copyIcon()}</button>
        <button class="sbtn edit" aria-label="Editar">${penIcon()}</button></div>`;
    const code=body.querySelector("code");
    body.querySelector(".reveal").onclick=()=>{ const shown=code.dataset.shown==="1"; code.textContent= shown?"••••••••":(s.value||"(vacío)"); code.dataset.shown=shown?"0":"1"; };
    body.querySelector(".copy").onclick=()=>copyText(s.value||"");
    body.querySelector(".edit").onclick=()=>openSecretForm(s);
    row.appendChild(body); list.appendChild(row);
  }
}
function copyText(t){
  if(!t){ toast("Nada que copiar"); return; }
  const done=()=>toast("Copiado al portapapeles");
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(done).catch(()=>fallbackCopy(t,done)); }
  else fallbackCopy(t,done);
}
function fallbackCopy(t,done){ try{ const ta=el("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); done(); }catch(_){ toast("No se pudo copiar"); } }

function openSecretForm(existing){
  if(!vaultUnlocked) return;
  const draft = existing ? {...existing} : { id:uid(), owner:(state.who!=="all"?state.who:"pepe"), category:"password", title:"", account:"", value:"", site:"", notes:"", createdAt:new Date().toISOString() };
  const root=$("#modalRoot");
  const ov=el("div","overlay"); ov.onclick=e=>{ if(e.target===ov) root.innerHTML=""; };
  const sheet=el("div","sheet");
  sheet.innerHTML=`
    <div class="sheet-head">
      <button class="iconbtn" id="closeS">✕</button>
      <h2>${existing?"Editar recordatorio":"Nuevo recordatorio"}</h2>
    </div>
    <div class="sheet-body">
      <label class="fld">Titular</label>
      <div class="seg" id="sOwner"></div>
      <label class="fld">Tipo</label>
      <div class="seg" id="sCatSeg"></div>
      <label class="fld">Título</label>
      <input class="input" id="sTitle" placeholder="Ej.: Radio del coche, Gmail, Wifi casa" value="${esc(draft.title)}">
      <label class="fld">Usuario / cuenta (opcional)</label>
      <input class="input" id="sAcc" placeholder="Ej.: pepe@gmail.com" value="${esc(draft.account||"")}" autocomplete="off">
      <label class="fld">Valor (contraseña, PIN, código)</label>
      <input class="input" id="sVal" placeholder="El dato a recordar" value="${esc(draft.value||"")}" autocomplete="off">
      <label class="fld">Sitio / web (opcional)</label>
      <input class="input" id="sSite" placeholder="Ej.: gmail.com" value="${esc(draft.site||"")}" autocomplete="off">
      <label class="fld">Notas (opcional)</label>
      <textarea class="input" id="sNotes" placeholder="Cualquier detalle">${esc(draft.notes||"")}</textarea>
      <button class="btn-primary" id="saveS">Guardar recordatorio</button>
      <button type="button" class="btn-neutral" id="cancelS">Cancelar</button>
      ${existing?`<button class="btn-ghost" id="delS">Eliminar recordatorio</button>`:""}
    </div>`;
  ov.appendChild(sheet); root.innerHTML=""; root.appendChild(ov);
  function seg(boxId, items, cur, pick){ const box=sheet.querySelector(boxId); box.innerHTML=""; items.forEach(it=>{ const b=el("button",cur===it.id?"on":""); const dot=el("span","dot"); dot.style.background=it.color; b.appendChild(dot); const sp=el("span"); sp.textContent=it.name; b.appendChild(sp); b.onclick=()=>pick(it.id); box.appendChild(b); }); }
  function ro(){ seg("#sOwner", PROFILES, draft.owner, id=>{draft.owner=id; ro();}); }
  function rc(){ seg("#sCatSeg", SECRET_CATS, draft.category, id=>{draft.category=id; rc();}); }
  ro(); rc();
  sheet.querySelector("#closeS").onclick=()=>root.innerHTML="";
  const _cs=sheet.querySelector("#cancelS"); if(_cs) _cs.onclick=()=>root.innerHTML="";
  sheet.querySelector("#saveS").onclick=async()=>{
    const payload={ title:sheet.querySelector("#sTitle").value.trim(), account:sheet.querySelector("#sAcc").value.trim(), value:sheet.querySelector("#sVal").value, site:sheet.querySelector("#sSite").value.trim(), notes:sheet.querySelector("#sNotes").value.trim() };
    if(!payload.title && !payload.value){ toast("Añade al menos un título o un valor"); return; }
    const enc=await _enc(vaultKey, payload);
    await sPut({ id:draft.id, owner:draft.owner, category:draft.category, createdAt:draft.createdAt, updatedAt:new Date().toISOString(), enc });
    await loadSecrets(); root.innerHTML=""; renderSecretList(); toast(existing?"Recordatorio actualizado":"Recordatorio guardado");
  };
  const del=sheet.querySelector("#delS");
  if(del) del.onclick=async()=>{ if(confirm("¿Eliminar este recordatorio? No se puede deshacer.")){ await sDel(draft.id); await loadSecrets(); root.innerHTML=""; renderSecretList(); toast("Recordatorio eliminado"); } };
}

/* ----- navegación ----- */
function renderCurrent(){ if(state.tab==="secrets") renderSecretsView(); else renderList(); }
function setFab(){ const fab=$("#addBtn"); if(!fab) return; fab.style.display = (state.tab==="secrets" && !vaultUnlocked) ? "none" : ""; }
function setTab(tab){
  state.tab=tab;
  $("#docsView").style.display = tab==="docs"?"":"none";
  $("#secretsView").style.display = tab==="secrets"?"":"none";
  document.querySelectorAll(".navbtn").forEach(b=>b.classList.toggle("on", b.dataset.tab===tab));
  const sub=document.querySelector(".brand .sub"); if(sub) sub.textContent = tab==="secrets"?"Recordatorios seguros":"Gestión de documentos";
  if(tab==="secrets") renderSecretsView(); else setFab();
}
function initNav(){
  document.querySelectorAll(".navbtn").forEach(b=> b.onclick=()=>setTab(b.dataset.tab));
  $("#addBtn").onclick=()=>{ if(state.tab==="secrets"){ if(vaultUnlocked) openSecretForm(); } else openForm(); };
  setFab();
}

/* ---------- Boot ---------- */
(async function(){
  try{ await openDB(); }catch(e){ alert("No se pudo iniciar el almacenamiento local."); return; }
  updateWho();
  initNav();
  await refresh();
})();
</script>
